<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footprint + Movement — OSIN CHAIN QUEBEC ULTIMATE</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<link rel="stylesheet" href="/static/css/style.css">
<style>
  #map { height: 100%; width: 100%; background: #0a0f1e; }
  .leaflet-container { background: #0a0f1e; }
  .leaflet-popup-content-wrapper { background: #131a2e; color: #e8edf5; border: 1px solid #2a3550; }
  .leaflet-popup-tip { background: #131a2e; }
  .leaflet-control-attribution { background: rgba(10,15,30,0.7); color: #94a3b8; }
  .leaflet-control-attribution a { color: #4ecdc4; }
  body { margin: 0; overflow: hidden; font-family: 'Inter', 'Segoe UI', sans-serif; background: #050810; color: #e8edf5; }
  .layout { display: grid; grid-template-columns: 1fr 380px; height: 100vh; }
  .map-wrap { position: relative; }
  #map { height: 100%; }
  .map-overlay {
    position: absolute; top: 16px; left: 16px; z-index: 1000;
    background: rgba(10,15,30,0.92); border: 1px solid #2a3550;
    padding: 12px 16px; border-radius: 8px; max-width: 360px;
    backdrop-filter: blur(8px);
  }
  .map-overlay h1 { font-size: 14px; color: #ffd60a; margin: 0 0 4px; letter-spacing: 1px; }
  .map-overlay p { font-size: 11px; color: #94a3b8; margin: 0; }
  .timeline-bar {
    position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 1000;
    background: rgba(10,15,30,0.95); border: 1px solid #2a3550;
    padding: 14px 18px; border-radius: 8px;
    display: flex; align-items: center; gap: 14px;
    backdrop-filter: blur(8px);
  }
  .tl-btn {
    background: #4ecdc4; color: #050810; border: none; border-radius: 6px;
    padding: 8px 14px; font-weight: 600; font-size: 12px; cursor: pointer;
    transition: all 0.15s; min-width: 80px;
  }
  .tl-btn:hover { background: #6ee0d8; }
  .tl-btn.secondary { background: #1a2335; color: #e8edf5; border: 1px solid #2a3550; }
  .tl-btn.secondary:hover { background: #2a3550; }
  .scrubber {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; background: #1a2335; border-radius: 3px; outline: none;
  }
  .scrubber::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; background: #ffd60a;
    border-radius: 50%; cursor: pointer; border: 2px solid #050810;
    box-shadow: 0 0 10px rgba(255, 214, 10, 0.5);
  }
  .tl-label {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: #ffd60a; font-weight: 600; min-width: 100px; text-align: center;
  }
  .panel-side {
    background: #0a0f1e; border-left: 1px solid #2a3550;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px; border-bottom: 1px solid #2a3550;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-header h2 { font-size: 13px; color: #ffd60a; margin: 0; letter-spacing: 1px; }
  .panel-back {
    background: none; border: 1px solid #2a3550; color: #94a3b8;
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .panel-back:hover { background: #1a2335; color: #e8edf5; }
  .panel-body { flex: 1; overflow-y: auto; padding: 14px 18px; }
  .empty-state { text-align: center; color: #64748b; padding: 60px 20px; font-size: 12px; }
  .empty-state .icon { font-size: 36px; opacity: 0.5; margin-bottom: 12px; }
  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-bottom: 14px;
  }
  .stat-card {
    background: #131a2e; border: 1px solid #2a3550;
    border-radius: 6px; padding: 10px;
  }
  .stat-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 18px; color: #4ecdc4; font-weight: 600; margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .stat-unit { font-size: 11px; color: #64748b; margin-left: 2px; }
  .section-title {
    font-size: 10px; color: #94a3b8; text-transform: uppercase;
    letter-spacing: 1px; margin: 14px 0 8px; font-weight: 600;
    border-bottom: 1px solid #2a3550; padding-bottom: 4px;
  }
  .snap-item {
    background: #131a2e; border: 1px solid #2a3550;
    border-radius: 6px; padding: 10px 12px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.15s;
    border-left: 3px solid #4ecdc4;
  }
  .snap-item:hover { background: #1a2335; border-left-color: #ffd60a; transform: translateX(2px); }
  .snap-item.active { background: #1a2335; border-left-color: #ffd60a; }
  .snap-trigger { font-size: 11px; color: #4ecdc4; font-weight: 600; }
  .snap-time { font-size: 10px; color: #94a3b8; font-family: 'JetBrains Mono', monospace; }
  .snap-stats { display: flex; gap: 10px; margin-top: 4px; font-size: 10px; color: #64748b; }
  .segment-item {
    background: #131a2e; border: 1px solid #2a3550;
    border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
    border-left: 3px solid #ffd60a;
  }
  .seg-route { font-size: 11px; color: #e8edf5; font-weight: 600; }
  .seg-meta { font-size: 10px; color: #94a3b8; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .seg-distance { color: #ffd60a; font-weight: 600; }
  .seg-speed { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 9px; font-weight: 600; text-transform: uppercase; }
  .seg-speed.stationary { background: #1a2335; color: #94a3b8; }
  .seg-speed.walking { background: #4ecdc433; color: #4ecdc4; }
  .seg-speed.city_drive { background: #ffd60a33; color: #ffd60a; }
  .seg-speed.highway { background: #ff8c0033; color: #ff8c00; }
  .seg-speed.air_travel { background: #9d4edd33; color: #c77dff; }
  .seg-speed.impossible { background: #ff003c33; color: #ff003c; }
  .anomaly {
    background: #131a2e; border-left: 3px solid #ff003c;
    padding: 10px 12px; margin-bottom: 6px; border-radius: 6px;
    font-size: 11px;
  }
  .anomaly.medium { border-left-color: #ffd60a; }
  .anomaly.low { border-left-color: #4ecdc4; }
  .anomaly-title { font-weight: 600; color: #ff003c; font-size: 11px; text-transform: uppercase; }
  .anomaly.medium .anomaly-title { color: #ffd60a; }
  .anomaly.low .anomaly-title { color: #4ecdc4; }
  .anomaly-desc { color: #94a3b8; margin-top: 4px; }
  .marker-pin {
    width: 14px; height: 14px; border-radius: 50%;
    border: 3px solid #050810; box-shadow: 0 0 8px rgba(78, 205, 196, 0.6);
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #00ff88;
    display: inline-block; margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.6); }
    50% { opacity: 0.6; box-shadow: 0 0 0 8px rgba(0, 255, 136, 0); }
  }
  .layer-toggle {
    position: absolute; top: 16px; right: 16px; z-index: 1000;
    background: rgba(10,15,30,0.92); border: 1px solid #2a3550;
    border-radius: 6px; padding: 8px; backdrop-filter: blur(8px);
    display: flex; flex-direction: column; gap: 6px;
  }
  .layer-btn {
    background: #1a2335; border: 1px solid #2a3550; color: #94a3b8;
    padding: 6px 10px; border-radius: 4px; font-size: 11px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .layer-btn.active { background: #4ecdc4; color: #050810; border-color: #4ecdc4; }
</style>
</head>
<body>
<div class="layout">
  <div class="map-wrap">
    <div id="map"></div>

    <div class="map-overlay">
      <h1><span class="live-dot"></span>FOOTPRINT — MOUVEMENT DU SUJET</h1>
      <p id="session-info">Session: <span id="sess-id">—</span></p>
      <p style="margin-top:6px;"><span id="status-text">En attente de session...</span></p>
    </div>

    <div class="layer-toggle">
      <button class="layer-btn active" data-layer="markers">📍 Marqueurs</button>
      <button class="layer-btn active" data-layer="path">🛣 Tracé mouvement</button>
      <button class="layer-btn active" data-layer="heatmap">🔥 Heatmap</button>
    </div>

    <div class="timeline-bar">
      <button class="tl-btn" id="tl-play">▶ Lecture</button>
      <button class="tl-btn secondary" id="tl-pause">⏸ Pause</button>
      <button class="tl-btn secondary" id="tl-reset">⟲ Reset</button>
      <input type="range" id="tl-scrubber" class="scrubber" min="0" max="100" value="0" step="1">
      <div class="tl-label" id="tl-time">T+0s</div>
    </div>
  </div>

  <aside class="panel-side">
    <div class="panel-header">
      <h2>📊 FOOTPRINT ANALYSIS</h2>
      <button class="panel-back" onclick="window.location='/'">← Index</button>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="empty-state">
        <div class="icon">🏴‍☠️</div>
        <p>Aucune session active</p>
        <p style="margin-top:8px;">Lancement une cascade depuis la page d'accueil, puis revenez ici pour visualiser le footprint + mouvement.</p>
        <p style="margin-top:14px;"><a href="/" style="color:#4ecdc4;text-decoration:none;">→ Lancer une recherche</a></p>
      </div>
    </div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="/static/js/footprint.js"></script>
</body>
</html>
